---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% include cta-banner.html %}

  {% if page.prev_url or page.next_url %}
  <nav class="chapter-nav" style="display: flex; justify-content: space-between; align-items: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e8e8e8;">
    <div style="flex: 1; text-align: left;">
      {% if page.prev_url %}
      <a href="{{ page.prev_url | relative_url }}" style="text-decoration: none;">
        &larr; {{ page.prev_title }}
      </a>
      {% endif %}
    </div>
    <div style="flex: 0 0 auto; text-align: center;">
      <a href="{{ '/' | relative_url }}" style="text-decoration: none;">Table of Contents</a>
    </div>
    <div style="flex: 1; text-align: right;">
      {% if page.next_url %}
      <a href="{{ page.next_url | relative_url }}" style="text-decoration: none;">
        {{ page.next_title }} &rarr;
      </a>
      {% endif %}
    </div>
  </nav>
  {% endif %}
</article>
